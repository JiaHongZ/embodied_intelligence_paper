name: Daily Embodied Intelligence Papers Update

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-papers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Fetch papers
        run: python scripts/fetch_arxiv.py --days 1 --max-results 600 --output data/new_papers.json

      - name: Categorize papers
        run: python scripts/categorize.py --input data/new_papers.json --output data/categorized_papers.json

      - name: Update paper database
        run: python scripts/update_database.py --input data/categorized_papers.json --database data/papers.json

      - name: Generate README
        run: python scripts/generate_readme.py --database data/papers.json --output README.md

      - name: Generate category files
        run: python scripts/generate_categories.py --database data/papers.json --output-dir categories

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/papers.json categories/
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: update embodied intelligence paper index"
          git push
